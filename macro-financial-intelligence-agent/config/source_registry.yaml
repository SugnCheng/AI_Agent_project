version: "0.1"
last_updated: "2026-04-15"
description: >
  Whitelisted source registry for macro-financial-intelligence-agent.
  This registry defines approved sources only. Open-web crawling is out of scope
  for v0.1.

# Validation contract:
# - source_id values must remain unique and stable because run_profiles.yaml references them.
# - source-level fields override defaults when present.
# - enabled: false means the source is registered but not eligible for v0.1 automated retrieval.
# - authority_tier and fetch_method values must stay aligned with FETCH_POLICY.md and ingestion bundle schema enums.

defaults:
  enabled: true
  language: "en"
  trust_score: 1.0
  priority_weight: 1.0
  default_cadence: "daily"
  fetch_method: "official_html"
  official_status: "official"

regions:
  - code: "US"
    display_name: "United States"
  - code: "JP"
    display_name: "Japan"
  - code: "TW"
    display_name: "Taiwan"

authority_tiers:
  - code: "TIER_1"
    description: "Official / central bank / regulator / government / exchange / official statistics"
  - code: "TIER_2"
    description: "Mainstream financial media"
  - code: "TIER_3"
    description: "Research institutes / think tanks"
  - code: "TIER_4"
    description: "Secondary commentary"

source_types:
  - "central_bank"
  - "regulator"
  - "government"
  - "exchange"
  - "statistics_agency"
  - "financial_media"
  - "research_institute"

fetch_methods:
  - "rss"
  - "official_html"
  - "official_pdf_index"
  - "manual_feed_stub"

sources:
  - source_id: "fed_fomc"
    display_name: "Federal Reserve - FOMC"
    region: "US"
    source_type: "central_bank"
    authority_tier: "TIER_1"
    official_status: "official"
    base_url: "https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm"
    fetch_method: "official_html"
    content_modes:
      - "statement"
      - "minutes"
      - "press_release"
      - "speech"
    default_cadence: "daily"
    language: "en"
    enabled: true
    priority_weight: 1.0
    trust_score: 1.0
    notes: "Highest-priority US monetary policy source."

  - source_id: "us_treasury"
    display_name: "U.S. Department of the Treasury"
    region: "US"
    source_type: "government"
    authority_tier: "TIER_1"
    official_status: "official"
    base_url: "https://home.treasury.gov/news"
    fetch_method: "official_html"
    content_modes:
      - "press_release"
      - "statement"
      - "policy_update"
    default_cadence: "daily"
    language: "en"
    enabled: true
    priority_weight: 0.95
    trust_score: 1.0

  - source_id: "bls"
    display_name: "U.S. Bureau of Labor Statistics"
    region: "US"
    source_type: "statistics_agency"
    authority_tier: "TIER_1"
    official_status: "official"
